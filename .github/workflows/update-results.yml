name: Update World Cup Results

on:
  schedule:
    # Run every 2 hours — matches last ~2 h so this catches each result promptly
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      debug:
        description: "Print extra git log after run"
        type: boolean
        default: false

permissions:
  contents: write  # allows pushing group/teams/main branches

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository (full history + all branches)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # GITHUB_TOKEN is automatically available; persist-credentials lets
          # subsequent git pushes authenticate without extra setup.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch all remote branches
        run: git fetch --all --prune

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run World Cup updater
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python scripts/update_wc.py

      - name: Show git graph (debug)
        if: ${{ inputs.debug == true }}
        run: git log --graph --oneline --all | head -80
