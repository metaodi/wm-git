name: Update World Cup Results

on:
  schedule:
    # Run every 2 hours — matches last ~2 h so this catches each result promptly
    - cron: "0 0-9/2,17-23/2 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (fetch data and log actions, but make no commits or pushes)"
        type: boolean
        default: false

permissions:
  contents: write  # allows pushing group/teams/main branches
  pages: write     # allows deploying to GitHub Pages
  id-token: write  # required by actions/deploy-pages

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository (full history + all branches)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # GITHUB_TOKEN is automatically available; persist-credentials lets
          # subsequent git pushes authenticate without extra setup.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch all remote branches
        run: git fetch --all --prune

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run World Cup updater
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          EXTRA_FLAGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            EXTRA_FLAGS="--dry-run"
          fi
          python scripts/update_wc.py $EXTRA_FLAGS

      - name: Show git graph (debug)
        run: git log --graph --oneline --all | head -80

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
